<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Livro - Sistema Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}" />
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="number"] { width: 100%; max-width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-avancar { background-color: #007bff; color: white; padding: 10px 15px; border: none; cursor: pointer; border-radius: 4px; }
        .container { max-width: 500px; margin: 50px auto; }
        .alert-error { color: #721c24; background-color: #f8d7da; padding: 10px; margin-bottom: 15px; border: 1px solid #f5c6cb; border-radius: 4px; font-weight: bold; }
        /* Adicionado estilo para o alerta de sucesso */
        .alert-success { background-color: #c6f6d5; color: #22543d; padding: 12px; border-radius: 4px; margin-bottom: 20px; font-weight: bold; text-align: center; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
<div th:replace="~{/fragments/header :: navegacao}"></div>
<div class="container">
    <h2>Inserir Novo Livro no Acervo</h2>

    <div th:if="${sucesso}" class="alert-success" th:text="${sucesso}"></div>

    <div th:if="${erro}" class="alert-error" th:text="${erro}"></div>

    <form th:action="@{/livros/salvar}" method="post">

        <h3>Dados do Título</h3>
        <div class="form-group">
            <label>Código ISBN:</label>
            <input type="text" name="isbn" th:value="${titulo?.isbn}" required />
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Edição:</label>
                <input type="number" name="edicao" th:value="${titulo?.id != null ? titulo.edicao : ''}" min="1" required />
            </div>
            <div class="form-group">
                <label>Ano de Publicação:</label>
                <input type="number" name="ano" th:value="${titulo?.id != null ? titulo.ano : ''}" required />
            </div>
        </div>

        <br><hr><br>

        <h3>Dados do Exemplar (Livro)</h3>
        <div class="form-group">
            <label>Código do Exemplar (ID Único):</label>
            <input type="number" name="codigo" th:value="${livro?.titulo != null ? livro.codigo : ''}" required />
        </div>

        <div class="form-group">
            <label>Disponibilidade:</label>
            <select name="disponivel">
                <option value="true" th:selected="${livro?.disponivel == true}">Disponível para Empréstimo</option>
                <option value="false" th:selected="${livro?.disponivel == false}">Indisponível / Reservado</option>
            </select>
        </div>

        <button type="submit" class="btn-salvar">Concluir Cadastro</button>
    </form>
</div>
</body>
</html>
