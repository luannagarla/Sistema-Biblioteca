<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Listagem de Livros - Sistema Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}" />
    <style>
        .container { max-width: 900px; margin: 30px auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #edf2f7; }
        .btn-novo { background-color: #007bff; color: white; padding: 10px 15px; text-decoration: none; display: inline-block; float: right; margin-bottom: 15px; }
        .alert-success { color: #155724; background-color: #d4edda; padding: 10px; margin-bottom: 15px; border: 1px solid #c3e6cb; }
        ul { margin: 0; padding-left: 20px; }
    </style>
</head>
<body>
<div th:replace="~{/fragments/header :: navegacao}"></div>
<div class="container" style="max-width: 900px;">
    <h2>Livros Cadastrados no Acervo</h2>

    <a th:href="@{/livros/novo}" class="btn-novo">+ Cadastrar Novo Livro</a>

    <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
        <thead style="background-color: #edf2f7;">
        <tr>
            <th style="padding: 10px;">Código do Exemplar</th>
            <th style="padding: 10px;">ISBN / Título</th>
            <th style="padding: 10px;">Edição / Ano</th>
            <th style="padding: 10px;">Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="l : ${livros}">
            <td style="padding: 10px; text-align: center;" th:text="${l.codigo}"></td>
            <td style="padding: 10px;" th:text="${l.titulo != null ? l.titulo.isbn : 'Sem ISBN'}"></td>
            <td style="padding: 10px; text-align: center;" th:text="${l.titulo != null ? l.titulo.edicao + 'ª Ed. (' + l.titulo.ano + ')' : '-'}"></td>
            <td style="padding: 10px; text-align: center;">
                <span th:if="${l.disponivel}" style="color: green; font-weight: bold;">Disponível</span>
                <span th:unless="${l.disponivel}" style="color: red; font-weight: bold;">Indisponível</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
