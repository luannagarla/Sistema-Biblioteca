<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Registrar Devolução</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}" />
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="number"] { width: 100%; max-width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-avancar { background-color: #007bff; color: white; padding: 10px 15px; border: none; cursor: pointer; border-radius: 4px; }
        .container { max-width: 500px; margin: 50px auto; }
        .alert-error { color: #721c24; background-color: #f8d7da; padding: 10px; margin-bottom: 15px; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
<div th:replace="~{/fragments/header :: navegacao}"></div>
<div class="container">
    <h2>Registrar Devolução</h2>
    <hr>

    <div th:if="${erro}" class="alert-error" th:text="${erro}">
        Nenhum empréstimo ativo foi encontrado.
    </div>

    <form th:action="@{/devolucoes/buscar}" method="POST">
        <div class="form-group">
            <label for="codigoLivro">Código do Livro a ser devolvido:</label>
            <input type="number" name="codigoLivro" id="codigoLivro" required placeholder="Ex: 17321" />
        </div>
        <div style="margin-top: 20px;">
            <button type="submit" class="btn-avancar">Buscar Empréstimo</button>
        </div>
    </form>
</div>
</body>
</html>
