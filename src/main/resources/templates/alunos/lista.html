<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Listagem de Alunos - Sistema Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}" />
    <style>
        .container { max-width: 900px; margin: 30px auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #edf2f7; }
        .btn-novo { background-color: #007bff; color: white; padding: 10px 15px; text-decoration: none; display: inline-block; float: right; margin-bottom: 15px; }
        .alert-success { color: #155724; background-color: #d4edda; padding: 10px; margin-bottom: 15px; border: 1px solid #c3e6cb; }
        ul { margin: 0; padding-left: 20px; }
    </style>
</head>
<body>
<div th:replace="~{/fragments/header :: navegacao}"></div>
<div class="container" style="max-width: 900px;">
    <h2>Alunos Cadastrados no Sistema</h2>
    <a th:href="@{/alunos/novo}" class="btn-novo">+ Cadastrar Novo Aluno</a>

    <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
        <thead style="background-color: #edf2f7;">
        <tr>
            <th style="padding: 10px;">Matrícula</th>
            <th style="padding: 10px;">Nome Completo</th>
            <th style="padding: 10px;">CPF</th>
            <th style="padding: 10px;">Endereço</th>
            <th style="padding: 10px;">Situação</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="aluno : ${alunos}">
            <td style="padding: 10px; text-align: center; font-weight: bold;" th:text="${aluno.matricula}"></td>
            <td style="padding: 10px;" th:text="${aluno.nome}"></td>
            <td style="padding: 10px; text-align: center;" th:text="${aluno.cpf}"></td>
            <td style="padding: 10px;" th:text="${aluno.endereco}"></td>
            <td style="padding: 10px;">
                <span th:if="${aluno.verificaDebito()}"
                      style="background-color: #fed7d7; color: #9b2c2c; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem;">
                    ⚠️ Em Débito
                </span>

                <span th:if="${!aluno.verificaDebito()}"
                      style="background-color: #c6f6d5; color: #22543d; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem;">
                    ✅ Regular
                </span>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(alunos)}">
            <td colspan="5" style="padding: 20px; text-align: center; color: #718096;">Nenhum aluno cadastrado até o momento.</td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
