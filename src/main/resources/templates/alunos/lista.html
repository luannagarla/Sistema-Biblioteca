<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Listagem de Alunos - Sistema Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}" />
</head>
<body>
<div class="container" style="max-width: 900px;">
    <h2>Alunos Cadastrados no Sistema</h2>

    <div style="margin-bottom: 20px; text-align: right;">
        <a th:href="@{/alunos/novo}" class="btn-salvar" style="text-decoration: none; padding: 10px 15px;">+ Cadastrar Novo Aluno</a>
    </div>

    <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
        <thead style="background-color: #edf2f7;">
        <tr>
            <th style="padding: 10px;">Matrícula</th>
            <th style="padding: 10px;">Nome Completo</th>
            <th style="padding: 10px;">CPF</th>
            <th style="padding: 10px;">Endereço</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="a : ${alunos}">
            <td style="padding: 10px; text-align: center; font-weight: bold;" th:text="${a.matricula}"></td>
            <td style="padding: 10px;" th:text="${a.nome}"></td>
            <td style="padding: 10px; text-align: center;" th:text="${a.cpf}"></td>
            <td style="padding: 10px;" th:text="${a.endereco}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(alunos)}">
            <td colspan="4" style="padding: 20px; text-align: center; color: #718096;">Nenhum aluno cadastrado até o momento.</td>
        </tr>
        </tbody>
    </table>

    <div style="margin-top: 25px; text-align: center;">
        <a th:href="@{/livros}" style="color: #3182ce; text-decoration: none; font-size: 0.9rem;">→ Ir para Listagem de Livros</a>
    </div>
</div>
</body>
</html>
