<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Aluno - Sistema Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}" />
</head>
<body>
<div class="container">
    <h2>Cadastrar Novo Aluno</h2>

    <div th:if="${param.sucesso}" style="background-color: #c6f6d5; color: #22543d; padding: 12px; border-radius: 4px; margin-bottom: 20px; font-weight: bold; text-align: center;">
        Aluno cadastrado com sucesso!
    </div>

    <form th:action="@{/alunos/salvar}" method="post">

        <div class="form-group">
            <label>Número de Matrícula (Apenas Números):</label>
            <input type="number" name="matricula" min="1" required />
        </div>

        <div class="form-group">
            <label>Nome Completo:</label>
            <input type="text" name="nome" required />
        </div>

        <div class="form-group">
            <label>CPF (Apenas números ou formato padrão):</label>
            <input type="text" name="cpf" required />
        </div>

        <div class="form-group">
            <label>Endereço:</label>
            <input type="text" name="endereco" required />
        </div>

        <button type="submit" class="btn-salvar">Concluir Cadastro</button>
    </form>

    <div style="margin-top: 20px; text-align: center;">
        <a th:href="@{/livros}" style="color: #3182ce; text-decoration: none; font-size: 0.9rem;">← Voltar para Livros</a>
    </div>
</div>
</body>
</html>
