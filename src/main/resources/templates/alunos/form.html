<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Aluno - Sistema Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}" />
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="number"] { width: 100%; max-width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-avancar { background-color: #007bff; color: white; padding: 10px 15px; border: none; cursor: pointer; border-radius: 4px; }
        .container { max-width: 500px; margin: 50px auto; }
        .alert-error { color: #721c24; background-color: #f8d7da; padding: 10px; margin-bottom: 15px; border: 1px solid #f5c6cb; border-radius: 4px; }
        .alert-success { background-color: #c6f6d5; color: #22543d; padding: 12px; border-radius: 4px; margin-bottom: 20px; font-weight: bold; text-align: center; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
<div th:replace="~{/fragments/header :: navegacao}"></div>
<div class="container">
    <h2>Cadastrar Novo Aluno</h2>

    <div th:if="${sucesso}" class="alert-success" th:text="${sucesso}"></div>

    <div th:if="${erro}" class="alert-error" th:text="${erro}"></div>

    <form th:action="@{/alunos/salvar}" method="post">

        <div class="form-group">
            <label>Número de Matrícula (Apenas Números):</label>
            <input type="number" name="matricula" min="1" required />
        </div>

        <div class="form-group">
            <label>Nome Completo:</label>
            <input type="text" name="nome" required />
        </div>

        <div class="form-group">
            <label>CPF (Apenas números ou formato padrão):</label>
            <input type="text" name="cpf" required />
        </div>

        <div class="form-group">
            <label>Endereço:</label>
            <input type="text" name="endereco" required />
        </div>

        <div class="botoes-container">
            <button type="submit" class="btn-salvar-ajustado btn-salvar">Concluir Cadastro</button>
        </div>
    </form>
</div>
</body>
</html>
